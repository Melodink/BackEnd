spring:
  config:
    activate:
      on-profile: prod

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://postgres:5432/melodink
    username: ${DB_ID}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: redis
      port: 6379
      client-type: lettuce

  cache:
    type: redis

jwt:
  header: Authorization
  secret: ${JWT_SECRET}