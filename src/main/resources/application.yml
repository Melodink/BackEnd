spring:
    datasource:
        url: jdbc:postgresql://postgres:5432/app
        username: user
        password: pass
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect

    data:
        redis:
            host: redis
            port: 6379